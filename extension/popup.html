<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h3 {
            margin-top: 0;
            color: #333;
        }
        .switch-container {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin: 10px;
        }
        .switch-container input {
            display: none;
        }
        .slider {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 34px;
            transition: .3s;
        }
        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }
        input:checked + .slider {
            background: #4CAF50;
        }
        input:checked + .slider::before {
            transform: translateX(24px);
        }
    </style>
</head>
<body>
    <h3>10FastFingers Helper</h3>    
    <label class="switch-container">
        <span class="switch-text">Helper</span>
        <input type="checkbox" id="common-switch">
        <span class="slider"></span>
    </label>
    <label class="switch-container">
        <span class="switch-text">Anticheat</span>
        <input type="checkbox" id="anticheat-switch">
        <span class="slider"></span>
    </label>
    <script src="popup.js"></script>
</body>
</html>
